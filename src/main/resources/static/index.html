<!DOCTYPE html>
<html>
<head>
    <title>Member Tracker</title>
    <link rel=”stylesheet” href=”https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css”rel=”nofollow” integrity=”sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm” crossorigin=”anonymous”>
</head>
<body>
<h1>Members</h1>
<table id="memberTable" border="1">
    <thead>
    <tr><th>ID</th><th>Name</th><th>Hire Date</th><th>Salary</th><th>Rate</th></tr>
    </thead>
    <tbody id="memberBody"></tbody>
</table>

<h2>Add Member</h2>
<form id="add-member">
    <div class="form-group">
        <input type="text" id="NAME" placeholder="Name">
    </div>
    <div class="form-group">
        <input type="date" id="hireDate">
    </div>
    <div class="form-group">
        <input type="number" id="salary" placeholder="Salary">
    </div>
    <div class="form-group">
        <input type="number" id="contributionRate" placeholder="Rate" step="0.01">
    </div>
    <button id="submit-btn" class="btn btn-primary">Add Member</button>
</form>


<script src="script.js"></script>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
